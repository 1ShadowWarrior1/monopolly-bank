name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      # VITE_BASE optional: vite.config also reads GITHUB_REPOSITORY (always set in Actions).
      - name: Build
        run: npm run build
        env:
          VITE_BASE: /${{ github.event.repository.name }}/

      - name: Verify Vite output (not raw dev index.html)
        run: |
          test -f dist/index.html
          if grep -q '/src/main.jsx' dist/index.html; then
            echo "ОШИБКА: в dist попал не собранный index.html. Проверьте npm run build локально."
            exit 1
          fi
          echo "OK: точка входа заменена на бандл из dist/assets/"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
